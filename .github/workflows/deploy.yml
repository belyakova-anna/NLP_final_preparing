name: Deploy NLP Tickets to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "Билет_*.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync ticket markdown into site/tickets
        run: |
          set -euo pipefail
          mkdir -p site/tickets
          # Copy each Билет_NN.md into site/tickets/ticket-NN.md
          shopt -s nullglob
          for f in Билет_*.md; do
            num=$(echo "$f" | sed -E 's/.*_([0-9]+)\.md/\1/')
            cp "$f" "site/tickets/ticket-${num}.md"
            echo "synced: $f -> site/tickets/ticket-${num}.md"
          done
          ls -la site/tickets

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
